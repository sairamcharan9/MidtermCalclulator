name: CI/CD Pipeline

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d test_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        pip install -r requirements.txt
        playwright install chromium
        playwright install-deps chromium

    - name: Run Unit Tests (core logic + security + schemas + model)
      run: pytest tests/unit -v

    - name: Run CLI Tests
      run: pytest tests/cli -v

    - name: Run FastAPI Integration Tests (User API + Calculator API)
      run: pytest tests/fastapi/integration -v

    - name: Run app in background for E2E
      run: |
        uvicorn main:app --host 0.0.0.0 --port 8000 &
        sleep 5

    - name: Run FastAPI End-to-End Tests
      run: TEST_URL=http://localhost:8000 pytest tests/fastapi/e2e -v

    - name: Run Full Coverage Report
      run: pytest --cov=app --cov=main --cov-report=term-missing tests/unit tests/fastapi/integration

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
    - uses: actions/checkout@v4

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_TOKEN }}

    - name: Build and Push Docker Image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/calculator-web-systems:latest
          ${{ secrets.DOCKER_USERNAME }}/calculator-web-systems:${{ github.sha }}
