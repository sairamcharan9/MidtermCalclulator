name: CI/CD Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  test:
    name: Test Suite (Python + PostgreSQL)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d test_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db
      JWT_SECRET: ci-test-secret-key-not-for-production
      JWT_ALGORITHM: HS256
      JWT_EXPIRE_MINUTES: "30"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── Unit tests (no DB required, fast feedback) ──────────────────────
      - name: Run Unit Tests
        run: pytest tests/unit -v

      # ── CLI tests ─────────────────────────────────────────────────────────
      - name: Run CLI Tests
        run: pytest tests/cli -v

      # ── Integration tests (require DB) ──────────────────────────────────
      - name: Run FastAPI Integration Tests
        run: pytest tests/fastapi/integration -v

      # ── Install Playwright only for E2E step ────────────────────────────
      - name: Install Playwright browsers
        run: |
          playwright install chromium
          playwright install-deps chromium

      # ── Start app for E2E ────────────────────────────────────────────────
      - name: Start application for E2E tests
        run: |
          uvicorn main:app --host 0.0.0.0 --port 8000 &
          echo "Waiting for app to be ready..."
          for i in $(seq 1 15); do
            curl -sf http://localhost:8000/health && break || sleep 2
          done

      # ── E2E browser tests ─────────────────────────────────────────────────
      - name: Run E2E Browser Tests
        run: TEST_URL=http://localhost:8000 pytest tests/fastapi/e2e -v

      # ── Coverage report ──────────────────────────────────────────────────
      - name: Generate Coverage Report
        run: |
          pytest --cov=app --cov=main \
                 --cov-report=term-missing \
                 --cov-report=xml \
                 tests/unit tests/fastapi/integration tests/cli

      - name: Upload Coverage to Codecov
        uses: codecov/codecov-action@v4
        if: always()
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  # ─────────────────────────────────────────────────────────────────────────
  deploy:
    name: Build & Push Docker Image
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: sb2853/calculator-web-systems
          tags: |
            type=raw,value=latest
            type=sha,prefix=git-

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
